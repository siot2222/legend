<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>👑 Host Console 👑</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090514 0%, #110926 100%);
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff007f;
            --text: #fff;
        }
        body { background: var(--bg-gradient); color: var(--text); font-family: sans-serif; padding: 40px; text-align: center; min-height: 100vh; }
        .host-panel { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); max-width: 800px; margin: 0 auto; box-shadow: 0 0 30px rgba(0,243,255,0.1); }
        .btn { background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta)); color: #000; border: none; padding: 18px 40px; font-weight: bold; border-radius: 12px; cursor: pointer; font-size: 1.3rem; margin: 15px 5px; transition: all 0.3s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--neon-cyan); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .timer { font-size: 3.5rem; font-weight: bold; color: var(--neon-magenta); text-shadow: 0 0 15px rgba(255,0,127,0.5); margin: 20px 0; }
        
        .player-list { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 30px 0; }
        .player-tag { background: rgba(255,255,255,0.05); padding: 12px 24px; border-radius: 30px; border: 1px solid var(--neon-cyan); font-weight: bold; }

        .rank-board { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; text-align: left; max-width: 500px; margin: 30px auto; }
        .rank-item { display: flex; justify-content: space-between; padding: 15px 20px; background: rgba(255,255,255,0.05); border-radius: 10px; border-left: 5px solid var(--neon-cyan); font-size: 1.2rem; }
        .rank-item:nth-child(1) { border-left-color: gold; background: rgba(255,215,0,0.1); }
        .rank-item:nth-child(2) { border-left-color: silver; }
        .rank-item:nth-child(3) { border-left-color: #cd7f32; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="host-panel">
    <h1>👑 QUIZ SHOW HOST CONSOLE 👑</h1>
    
    <!-- 1단계: 대기방 화면 -->
    <div id="lobby-view">
        <p style="font-size: 1.1rem; color: #aaa;">참여자 기기에 닉네임을 입력하고 입장하게 해주세요!</p>
        <div class="player-list" id="lobby">
            <!-- 참가자 목록 -->
        </div>
        <button class="btn" id="ctrl-btn" onclick="startQuiz()">🎯 대결 시작하기!</button>
    </div>

    <!-- 2단계: 실시간 퀴즈 진행 제어 화면 -->
    <div id="quiz-view" class="hidden">
        <h2 id="host-progress" style="color: var(--neon-cyan);">문제 1 / 3</h2>
        <h1 id="host-question" style="margin: 30px 0; font-size: 2.2rem;">문제가 여기에 노출됩니다.</h1>
        
        <div class="timer" id="host-timer">20</div>
        <p id="submission-counter" style="color: #aaa; font-size: 1.1rem;">답안 제출 현황: 0명 완료</p>

        <!-- 수동 결과 스킵 버튼 (타이머 작동 중에만 활성화) -->
        <button class="btn btn-secondary" id="skip-btn" onclick="forceSkip()">⏱️ 바로 결과 보기 (수동 스킵)</button>

        <!-- 라운드 결과 피드백 보드 (정답 공개 후 오픈) -->
        <div id="round-feedback" class="hidden">
            <h2 style="color: var(--neon-magenta); margin-top: 30px;">이번 문제 정답: <span id="correct-ans-reveal"></span></h2>
            <h3 style="margin-top: 20px; color: gold;">🏆 현재 실시간 종합 스코어보드</h3>
            <div class="rank-board" id="scoreboard-list"></div>
        </div>

        <div style="text-align: center;">
            <button class="btn" id="next-btn" onclick="nextQuestion()" style="display: none;">다음 단계로 넘어가기 ➡️</button>
        </div>
    </div>

    <!-- 3단계: 최종 시상식 화면 -->
    <div id="ending-view" class="hidden">
        <h1 style="font-size: 3rem; color: gold; text-shadow: 0 0 20px rgba(255,215,0,0.4); margin-bottom: 20px;">🏆 FINAL CHAMPIONS 🏆</h1>
        <div class="rank-board" id="final-scoreboard-list"></div>
        <button class="btn" onclick="location.reload()">🔄 처음 화면으로</button>
    </div>
</div>

<script>
    const socket = io();

    // 대기실 유저 상태 갱신
    socket.on('updatePlayers', (players) => {
        const lobby = document.getElementById('lobby');
        lobby.innerHTML = '';
        players.forEach(p => {
            lobby.innerHTML += `<div class="player-tag">👤 ${p.nickname}</div>`;
        });
    });

    // 참가자 제출 현황 실시간 감지
    socket.on('playerSubmitted', (players) => {
        const submittedCount = players.filter(p => p.currentAnswer !== null).length;
        document.getElementById('submission-counter').innerText = `답안 제출 현황: ${submittedCount} / ${players.length}명 완료`;
    });

    function startQuiz() {
        document.getElementById('lobby-view').classList.add('hidden');
        document.getElementById('quiz-view').classList.remove('hidden');
        nextQuestion();
    }

    function nextQuestion() {
        socket.emit('nextQuestion');
    }

    // 수동 스킵 호출
    function forceSkip() {
        socket.emit('forceSkip');
    }

    // 서버 타이머 실시간 수신 및 표시
    socket.on('timerUpdate', (time) => {
        const t = document.getElementById('host-timer');
        t.innerText = time;
        if(time <= 5) {
            t.style.color = '#ff0000';
        } else {
            t.style.color = 'var(--neon-magenta)';
        }
    });

    // 신규 문제 수신
    socket.on('newQuestion', (q) => {
        document.getElementById('round-feedback').classList.add('hidden');
        document.getElementById('host-timer').classList.remove('hidden');
        document.getElementById('skip-btn').style.display = 'inline-block'; // 스킵 버튼 노출
        document.getElementById('next-btn').style.display = 'none'; // 다음 버튼 숨김

        document.getElementById('host-progress').innerText = `문제 ${q.index + 1} / ${q.total}`;
        document.getElementById('host-question').innerText = `Q. ${q.question}`;
        document.getElementById('submission-counter').innerText = `답안 제출 현황: 0명 완료`;
    });

    // 라운드 종료 피드백 (전원 제출 완료, 타이머 소진, 혹은 호스트가 스킵했을 때 동일하게 작동)
    socket.on('hostRoundResult', (data) => {
        document.getElementById('host-timer').classList.add('hidden');
        document.getElementById('skip-btn').style.display = 'none'; // 스킵 버튼 숨김
        document.getElementById('round-feedback').classList.remove('hidden');
        document.getElementById('next-btn').style.display = 'inline-block'; // 다음 버튼 노출

        // 정답 노출
        document.getElementById('correct-ans-reveal').innerText = `[ ${data.correctAnswer} ]`;

        // 실시간 순위표 그리기
        const board = document.getElementById('scoreboard-list');
        board.innerHTML = '';
        data.ranking.slice(0, 5).forEach((p, idx) => {
            board.innerHTML += `
                <div class="rank-item">
                    <span><strong>${idx + 1}위</strong>. ${p.nickname}</span>
                    <span>${p.score}점</span>
                </div>
            `;
        });
    });

    // 게임 전체 종료
    socket.on('gameOver', (ranking) => {
        document.getElementById('quiz-view').classList.add('hidden');
        document.getElementById('ending-view').classList.remove('hidden');

        const finalBoard = document.getElementById('final-scoreboard-list');
        finalBoard.innerHTML = '';
        ranking.forEach((p, idx) => {
            let trophy = idx === 0 ? '🥇 ' : idx === 1 ? '🥈 ' : idx === 2 ? '🥉 ' : '🏅 ';
            finalBoard.innerHTML += `
                <div class="rank-item">
                    <span>${trophy} <strong>${p.nickname}</strong></span>
                    <span>${p.score}점</span>
                </div>
            `;
        });
    });
</script>
</body>
</html>
